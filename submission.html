<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
		}

		#visualization-activity {
			width: 600px;
			height: 500px;
		}

		/* YOUR CSS CODE WILL GO HERE */
        .bar {
			transition: opacity 0.2s;
		}
		.bar:hover {
			opacity: 0.7;
		}

		.line2{ fill: #3cb44a; }
        .line3{ fill: #ff7300; }
		.line1{ fill: #0052a4; }

		.label-station { font-size: 11px; text-anchor: middle; font-weight: bold; }
		.label-value { font-size: 10px; text-anchor: middle; fill: #666;}

		.axis-line{ stroke: #333; stroke-width: 2;}

	</style>
</head>

<body>
	<h1 id="header-title">
		Jahyun Koo
	</h1>

	<svg id="visualization-activity">
		<!-- YOUR SVG CODE WILL GO HERE -->
        <line x1="40" y1="450" x2="560" y2="450" class="axis-line" />

		<g transform="translate(60,0)">
			<rect class="bar line2" x="0" y="86" width="50" height="364" />
			<text x="25" y="465" class="label-station">Hongdae</text>
			<text x="25" y="80" class="label-value">72,874</text>
		</g>
		<g transform="translate(140, 0)">
    <rect class="bar line2" x="0" y="135" width="50" height="315" />
    <text x="25" y="465" class="label-station">Jamsil</text>
    <text x="25" y="129" class="label-value">63,085</text>
</g>

<g transform="translate(220, 0)">
    <rect class="bar line3" x="0" y="182" width="50" height="268" />
    <text x="25" y="465" class="label-station">Exp Bus</text>
    <text x="25" y="176" class="label-value">53,566</text>
</g>

<g transform="translate(300, 0)">
    <rect class="bar line1" x="0" y="247" width="50" height="203" />
    <text x="25" y="465" class="label-station">Seoul St.</text>
    <text x="25" y="241" class="label-value">40,617</text>
</g>

<g transform="translate(380, 0)">
    <rect class="bar line2" x="0" y="259" width="50" height="191" />
    <text x="25" y="465" class="label-station">Sillim</text>
    <text x="25" y="253" class="label-value">38,271</text>
</g>

<g transform="translate(460, 0)">
    <rect class="bar line2" x="0" y="262" width="50" height="188" />
    <text x="25" y="465" class="label-station">Sindorim</text>
    <text x="25" y="256" class="label-value">37,521</text>
</g>

	</svg>

</body>
</html>
